# Production profile — activated via SPRING_PROFILES_ACTIVE=prod
# Fly.io sets DATABASE_URL / DATABASE_USERNAME / DATABASE_PASSWORD as secrets
# pointing at a Neon Postgres instance.

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.h2.console.enabled=false

server.port=${PORT:8080}

# CORS allow-list for the deployed client (comma-separated)
app.cors.allowed-origins=${ALLOWED_ORIGIN:*}

# Trust X-Forwarded-* headers from Vercel's proxy so OAuth redirect_uri
# reflects the client-facing domain, not the Fly internal host.
server.forward-headers-strategy=framework

# Google OAuth
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# Comma-separated emails allowed to sign in.
app.auth.allowed-emails=${ALLOWED_EMAILS:}

# Where to land after successful login
app.auth.post-login-redirect=${POST_LOGIN_REDIRECT:/}
