# Production profile — activated via SPRING_PROFILES_ACTIVE=prod
# Fly.io sets DATABASE_URL / DATABASE_USERNAME / DATABASE_PASSWORD as secrets
# pointing at a Neon Postgres instance.

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.h2.console.enabled=false

server.port=${PORT:8080}

# CORS allow-list for the deployed client (comma-separated)
app.cors.allowed-origins=${ALLOWED_ORIGIN:*}
