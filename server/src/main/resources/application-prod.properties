# Production profile — activated via SPRING_PROFILES_ACTIVE=prod
# Fly.io sets DATABASE_URL / DATABASE_USERNAME / DATABASE_PASSWORD as secrets
# pointing at a Neon Postgres instance.

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.h2.console.enabled=false

server.port=${PORT:8080}

# CORS allow-list for the deployed client (comma-separated)
app.cors.allowed-origins=${ALLOWED_ORIGIN:*}

# Trust X-Forwarded-* headers from Vercel's proxy so OAuth redirect_uri
# reflects the client-facing domain, not the Fly internal host.
server.forward-headers-strategy=framework

# Session cookie — must survive the OAuth cross-site redirect back from Google
# and the HTTPS-only proxy at Vercel.
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.path=/

# Google OAuth
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
# Force the redirect URI to the client-facing Vercel domain so it matches what's
# registered in Google Cloud Console — otherwise Spring derives it from the Fly host.
# Must be set as a Fly secret; no default because nested {braces} confuse the parser.
spring.security.oauth2.client.registration.google.redirect-uri=${OAUTH_REDIRECT_URI}

# Comma-separated emails allowed to sign in.
app.auth.allowed-emails=${ALLOWED_EMAILS:}

# Where to land after successful login
app.auth.post-login-redirect=${POST_LOGIN_REDIRECT:/}

# Web Push (VAPID) keys. Generate once with `nl.martijndwars.webpush.Cli keygen`
# or any VAPID generator, then set as Fly secrets. If empty, reminders are disabled.
push.vapid.public-key=${VAPID_PUBLIC_KEY:}
push.vapid.private-key=${VAPID_PRIVATE_KEY:}
push.vapid.subject=${VAPID_SUBJECT:mailto:admin@fit-tracker.app}
