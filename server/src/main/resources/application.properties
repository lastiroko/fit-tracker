spring.jackson.serialization.indent-output=true
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
logging.level.org.hibernate.SQL=warn

# Local file-based H2 so meals persist across restarts.
# Swapped for Postgres (Neon) at deploy time via application-prod.properties.
spring.datasource.url=jdbc:h2:file:./data/fittracker;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Local dev CORS — prod overrides via ALLOWED_ORIGIN env var.
app.cors.allowed-origins=${ALLOWED_ORIGIN:http://localhost:5173}

# Anthropic API configuration for food recognition
anthropic.api.key=${ANTHROPIC_API_KEY:}

# Actuator — health check only, nothing else exposed
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

# Dev: push disabled unless you set these in a local .env.
push.vapid.public-key=${VAPID_PUBLIC_KEY:}
push.vapid.private-key=${VAPID_PRIVATE_KEY:}
push.vapid.subject=${VAPID_SUBJECT:mailto:dev@fit-tracker.local}
